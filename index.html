<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markov Composer - Julia Dudlak</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #7c3aed;
    --accent3: #06b6d4;
    --text: #e4e4f0;
    --muted: #5a5a7a;
    --hot: #f97316;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 999;
  }

  header {
    padding: 2rem 2.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1.5rem;
    position: relative;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(232,255,71,0.35);
    line-height: 1;
  }

  .blog-btn {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.45rem 1.1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent);
    text-decoration: none; font-weight: 700;
    transition: all 0.15s;
  }
  .blog-btn:hover {
    background: rgba(232,255,71,0.08);
    box-shadow: 0 0 14px rgba(232,255,71,0.2);
  }

  main {
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 80px);
  }

  .panel {
    background: var(--panel);
    padding: 1.5rem;
  }

  #controls { grid-row: 1 / 3; display: flex; flex-direction: column; gap: 1.4rem; }

  .section-label {
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem; margin-bottom: 0.75rem;
  }

  .control-row { display: flex; flex-direction: column; gap: 0.4rem; }
  .control-row label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; }
  .control-row .val { color: var(--accent); font-size: 0.75rem; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 3px; background: var(--border);
    border-radius: 0; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--accent); border-radius: 0; cursor: pointer;
    box-shadow: 0 0 8px rgba(232,255,71,0.5);
  }

  select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); padding: 0.5rem 0.75rem;
    font-family: 'Space Mono', monospace; font-size: 0.75rem;
    width: 100%; cursor: pointer; outline: none;
    appearance: none; -webkit-appearance: none;
  }
  select:focus { border-color: var(--accent2); }

  textarea {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); padding: 0.5rem;
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    width: 100%; resize: vertical; min-height: 80px;
    outline: none; line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent2); }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 0.75rem 1rem; font-family: 'Space Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
    border: none; cursor: pointer; transition: all 0.15s; font-weight: 700;
  }
  .btn-primary { background: var(--accent); color: #0a0a0f; }
  .btn-primary:hover { box-shadow: 0 0 20px rgba(232,255,71,0.4); }
  .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-secondary:hover { background: rgba(232,255,71,0.08); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: rgba(239,68,68,0.08); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #status {
    font-size: 0.65rem; color: var(--muted);
    padding: 0.5rem; background: var(--bg);
    border: 1px solid var(--border); min-height: 2rem;
    display: flex; align-items: center;
  }
  #status.ok { color: var(--accent); }
  #status.err { color: var(--danger); }
  #status.playing { color: var(--hot); }

  #roll-area { overflow: hidden; }
  #roll-area h2 { font-family: 'Bebas Neue'; font-size: 1.3rem; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }

  #piano-roll {
    width: 100%; overflow-x: auto; overflow-y: hidden;
    background: var(--bg); border: 1px solid var(--border);
    position: relative;
  }
  #roll-canvas { display: block; }

  #matrix-area { overflow: hidden; }
  #matrix-area h2 { font-family: 'Bebas Neue'; font-size: 1.3rem; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }
  #matrix-wrap { overflow: auto; max-height: 320px; }
  #matrix-canvas { display: block; }

  #ticker {
    grid-column: 2;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    font-size: 0.7rem; color: var(--muted);
    overflow: hidden;
  }
  #ticker-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; flex-shrink: 0; }
  #ticker-notes { display: flex; gap: 0.4rem; overflow: hidden; }
  .tick-note {
    padding: 0.2rem 0.5rem; background: var(--border);
    font-size: 0.65rem; transition: all 0.1s; flex-shrink: 0;
  }
  .tick-note.active { background: var(--accent); color: #0a0a0f; }
</style>
</head>
<body>

<header>
  <h1>MARKOV COMPOSER</h1>
  <h2>- Julia Dudlak</h2>
  <a href="blog.html" class="blog-btn">Blog Post</a>
</header>

<main>

  <div class="panel" id="controls">

    <div>
      <div class="section-label">Training Data</div>
      <div class="control-row">
        <label>Source</label>
        <select id="data-source">
          <option value="twinkle">Twinkle Twinkle (built-in)</option>
          <option value="custom">Custom MIDI notes (below)</option>
        </select>
      </div>
      <div class="control-row" id="custom-row" style="display:none;">
        <label>Custom notes (space-separated MIDI #s)</label>
        <textarea id="custom-notes" placeholder="e.g. 60 62 64 65 67 69 71 72"></textarea>
      </div>
    </div>

    <div>
      <div class="section-label">Chain Parameters</div>
      <div class="control-row">
        <label>Order (n): <span class="val" id="order-val">2</span></label>
        <input type="range" id="order" min="1" max="4" value="2" step="1"/>
      </div>
      <div class="control-row">
        <label>Generate length: <span class="val" id="len-val">32</span> notes</label>
        <input type="range" id="gen-len" min="8" max="64" value="32" step="4"/>
      </div>
    </div>

    <div>
      <div class="section-label">Playback</div>
      <div class="control-row">
        <label>Tempo: <span class="val" id="bpm-val">160</span> BPM</label>
        <input type="range" id="bpm" min="60" max="300" value="160" step="5"/>
      </div>
    </div>

    <button class="btn btn-primary" id="train-btn">⚙ Train + Generate</button>
    <button class="btn btn-secondary" id="regen-btn" disabled>↺ Re-generate</button>
    <button class="btn btn-secondary" id="play-btn" disabled>▶ Play</button>
    <button class="btn btn-danger" id="stop-btn" disabled>■ Stop</button>

    <div id="status">Ready — train to begin</div>

  </div>

  <div class="panel" id="roll-area">
    <h2>Generated Sequence</h2>
    <div id="piano-roll">
      <canvas id="roll-canvas" height="160"></canvas>
    </div>
  </div>

  <div class="panel" id="matrix-area" style="grid-column:2;">
    <h2>Transition Matrix <span style="font-size:0.7rem;color:var(--muted);font-family:'Space Mono';"></span></h2>
    <div id="matrix-wrap">
      <canvas id="matrix-canvas"></canvas>
    </div>
  </div>

</main>

<div id="ticker">
  <span id="ticker-label">Now Playing</span>
  <div id="ticker-notes"></div>
</div>

<script src="script.js"></script>
<script>
let chain = null;
let generatedNotes = [];
let audioEngine = new AudioEngine();

const orderSlider   = document.getElementById('order');
const orderVal      = document.getElementById('order-val');
const lenSlider     = document.getElementById('gen-len');
const lenVal        = document.getElementById('len-val');
const bpmSlider     = document.getElementById('bpm');
const bpmVal        = document.getElementById('bpm-val');
const trainBtn      = document.getElementById('train-btn');
const regenBtn      = document.getElementById('regen-btn');
const playBtn       = document.getElementById('play-btn');
const stopBtn       = document.getElementById('stop-btn');
const statusEl      = document.getElementById('status');
const dataSource    = document.getElementById('data-source');
const customRow     = document.getElementById('custom-row');
const customNotes   = document.getElementById('custom-notes');
const rollCanvas    = document.getElementById('roll-canvas');
const matrixCanvas  = document.getElementById('matrix-canvas');
const tickerNotes   = document.getElementById('ticker-notes');

orderSlider.addEventListener('input', () => orderVal.textContent = orderSlider.value);
lenSlider.addEventListener('input', () => lenVal.textContent = lenSlider.value);
bpmSlider.addEventListener('input', () => bpmVal.textContent = bpmSlider.value);
dataSource.addEventListener('change', () => {
  customRow.style.display = dataSource.value === 'custom' ? '' : 'none';
});

function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

function getTrainingData() {
  if (dataSource.value === 'twinkle') return TWINKLE_NOTES;
  const raw = customNotes.value.trim().split(/\s+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 127);
  if (raw.length < 4) throw new Error('Need at least 4 valid MIDI note numbers (0–127)');
  return raw;
}

function trainAndGenerate() {
  try {
    const data = getTrainingData();
    const order = parseInt(orderSlider.value);
    const genLen = parseInt(lenSlider.value);

    chain = new MarkovChain(order);
    chain.train(data);

    if (chain.transitions.size === 0) throw new Error('Not enough data to build chain at this order');

    generatedNotes = chain.generate(genLen);
    if (generatedNotes.length === 0) throw new Error('Generation produced no notes');

    setStatus(`Trained on ${data.length} notes · generated ${generatedNotes.length} notes`, 'ok');
    regenBtn.disabled = false;
    playBtn.disabled = false;

    drawRoll(generatedNotes, -1);
    drawMatrix(chain, data);
    buildTicker(generatedNotes);

  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
  }
}

function regenerate() {
  if (!chain) return;
  const genLen = parseInt(lenSlider.value);
  generatedNotes = chain.generate(genLen);
  drawRoll(generatedNotes, -1);
  buildTicker(generatedNotes);
  setStatus(`Re-generated ${generatedNotes.length} notes`, 'ok');
}

trainBtn.addEventListener('click', trainAndGenerate);
regenBtn.addEventListener('click', regenerate);

playBtn.addEventListener('click', async () => {
  if (!generatedNotes.length) return;
  playBtn.disabled = true;
  trainBtn.disabled = true;
  regenBtn.disabled = true;
  stopBtn.disabled = false;
  setStatus('▶ Playing...', 'playing');

  const bpm = parseInt(bpmSlider.value);
  await audioEngine.playSequence(generatedNotes, bpm, (idx, note) => {
    drawRoll(generatedNotes, idx);
    highlightTicker(idx);
  });

  if (!audioEngine.stopFlag) setStatus(`Done playing ${generatedNotes.length} notes`, 'ok');
  else setStatus('Stopped', '');
  resetPlayUI();
});

stopBtn.addEventListener('click', () => {
  audioEngine.stop();
  resetPlayUI();
  drawRoll(generatedNotes, -1);
  setStatus('Stopped', '');
});

function resetPlayUI() {
  playBtn.disabled = false;
  trainBtn.disabled = false;
  regenBtn.disabled = false;
  stopBtn.disabled = true;
}

const CELL_W = 22;
const ROLL_H = 160;
const NOTE_COLORS = {
  black: '#1a1a2e',
  white: '#12121e',
  active: '#e8ff47',
  played: '#7c3aed',
};

function drawRoll(notes, activeIdx) {
  if (!notes.length) return;
  const min = Math.min(...notes);
  const max = Math.max(...notes);
  const range = Math.max(max - min + 1, 8);
  const rowH = Math.floor(ROLL_H / range);
  const W = notes.length * CELL_W;

  rollCanvas.width = Math.max(W, rollCanvas.parentElement.offsetWidth);
  rollCanvas.height = ROLL_H;
  const ctx = rollCanvas.getContext('2d');
  ctx.clearRect(0, 0, rollCanvas.width, ROLL_H);

  for (let r = 0; r < range; r++) {
    const midi = min + r;
    const isBlack = [1,3,6,8,10].includes(midi % 12);
    ctx.fillStyle = isBlack ? '#0d0d18' : '#111120';
    ctx.fillRect(0, ROLL_H - (r+1)*rowH, rollCanvas.width, rowH);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= notes.length; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL_W, 0); ctx.lineTo(i*CELL_W, ROLL_H); ctx.stroke();
  }

  for (let i = 0; i < notes.length; i++) {
    const row = notes[i] - min;
    const x = i * CELL_W;
    const y = ROLL_H - (row+1)*rowH;
    let color;
    if (i === activeIdx) color = NOTE_COLORS.active;
    else if (i < activeIdx) color = NOTE_COLORS.played;
    else color = '#06b6d4';

    ctx.fillStyle = color;
    ctx.fillRect(x+1, y+1, CELL_W-2, rowH-1);

    if (i === activeIdx) {
      ctx.shadowColor = '#e8ff47';
      ctx.shadowBlur = 14;
      ctx.fillRect(x+1, y+1, CELL_W-2, rowH-1);
      ctx.shadowBlur = 0;
    }
  }

  if (activeIdx >= 0 && activeIdx < notes.length) {
    const row = notes[activeIdx] - min;
    const x = activeIdx * CELL_W;
    const y = ROLL_H - (row+1)*rowH;
    ctx.fillStyle = '#0a0a0f';
    ctx.font = 'bold 9px Space Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(midiToName(notes[activeIdx]), x + CELL_W/2, y + rowH - 3);
  }
}

const TICKER_SIZE = 24;
function buildTicker(notes) {
  tickerNotes.innerHTML = '';
  const display = notes.slice(0, TICKER_SIZE);
  display.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = 'tick-note';
    el.textContent = midiToName(n);
    el.dataset.idx = i;
    tickerNotes.appendChild(el);
  });
}
function highlightTicker(idx) {
  document.querySelectorAll('.tick-note').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });
}

function drawMatrix(chain, trainingData) {
  const firstOrder = new MarkovChain(1);
  firstOrder.train(trainingData);
  const { allNotes } = firstOrder.getTransitionMatrix();
  const N = allNotes.length;
  if (N === 0) return;

  const CELL = 36;
  const LABEL = 42;
  const W = LABEL + N * CELL;
  const H = LABEL + N * CELL;

  matrixCanvas.width = W;
  matrixCanvas.height = H;
  const ctx = matrixCanvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  const probMap = {};
  for (const from of allNotes) {
    const key = JSON.stringify([from]);
    const counts = firstOrder.transitions.get(key) || {};
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    for (const to of allNotes) {
      probMap[`${from}_${to}`] = total ? (counts[to] || 0) / total : 0;
    }
  }

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const from = allNotes[r];
      const to   = allNotes[c];
      const p = probMap[`${from}_${to}`];
      const x = LABEL + c * CELL;
      const y = LABEL + r * CELL;

      if (p > 0) {
        const alpha = 0.15 + p * 0.85;
        const g = Math.floor(p * 255);
        ctx.fillStyle = `rgba(${Math.floor(p*200+56)}, ${g}, ${Math.floor(p*71)}, ${alpha})`;
      } else {
        ctx.fillStyle = '#111120';
      }
      ctx.fillRect(x, y, CELL-1, CELL-1);

      if (p > 0.1) {
        ctx.fillStyle = p > 0.5 ? '#0a0a0f' : '#e4e4f0';
        ctx.font = '7px Space Mono, monospace';
        ctx.textAlign = 'center';
        ctx.fillText((p*100).toFixed(0)+'%', x+CELL/2, y+CELL/2+3);
      }
    }
  }

  ctx.font = '9px Space Mono, monospace';
  ctx.textAlign = 'right';
  for (let r = 0; r < N; r++) {
    ctx.fillStyle = '#5a5a7a';
    ctx.fillText(midiToName(allNotes[r]), LABEL-4, LABEL + r*CELL + CELL/2+3);
  }
  ctx.textAlign = 'center';
  for (let c = 0; c < N; c++) {
    ctx.save();
    ctx.translate(LABEL + c*CELL + CELL/2, LABEL-4);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle = '#5a5a7a';
    ctx.fillText(midiToName(allNotes[c]), 0, 0);
    ctx.restore();
  }

  ctx.fillStyle = '#3a3a5a';
  ctx.font = '8px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TO →', LABEL + (N*CELL)/2, 10);
  ctx.save();
  ctx.translate(9, LABEL + (N*CELL)/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('FROM →', 0, 0);
  ctx.restore();
}

rollCanvas.width = rollCanvas.parentElement.offsetWidth || 600;
rollCanvas.height = ROLL_H;
const initCtx = rollCanvas.getContext('2d');
initCtx.fillStyle = '#0a0a0f';
initCtx.fillRect(0, 0, rollCanvas.width, ROLL_H);
initCtx.fillStyle = '#1e1e2e';
initCtx.font = '12px Space Mono, monospace';
initCtx.textAlign = 'center';
initCtx.fillText('Train the chain to see generated notes here', rollCanvas.width/2, ROLL_H/2);

window.addEventListener('load', () => { trainAndGenerate(); });
</script>
</body>
</html>
